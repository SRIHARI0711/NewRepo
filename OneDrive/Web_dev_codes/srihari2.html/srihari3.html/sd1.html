<!DOCTYPE html>
<html lang="en">
   <head>
      <title>Table example</title>
      <style>
         table{
            border-spacing: 5px;
            caption-side:top;
            padding: 15px;
         }
         th,td{
            text-align: left;
            padding: 15px;
            border:1px solid black;

         }
      </style>
   </head>
   <body>
      <table>
         <tr>
            <th><u>FIRST NAME</u></th>
            <th><u>LAST NAME</u></th>
            <th><u>Age</u></th>

         </tr>

         <tr>
            <td>Anantha Venkata Suresh Babu</td>
            <td>Divvela</td>
            <td>49</td>
         </tr>

         <tr>
            <td>Madhuri</td>
            <td>Divvela</td>
            <td>40</td>
         </tr>
         
         <tr>
            <td>Hanumantharao</td>
            <td>Divvela</td>
            <td>20</td>
         </tr>

         <tr>
            <td>Srihari</td>
            <td>Divvela</td>
            <td>18</td>
         </tr>
         <caption><strong>MY FAMILY</strong></caption>
      </table>
   </body>
</html>
