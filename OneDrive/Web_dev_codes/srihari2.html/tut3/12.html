<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    table {
      width: 80%;
      border-collapse: collapse;
      margin: 20px auto;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }
  </style>
  <title>Global Temperature Table</title>
</head>
<body>

  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>Temperature (°C)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>2000</td>
        <td>14.2</td>
      </tr>
      <tr>
        <td>2005</td>
        <td>14.5</td>
      </tr>
      <tr>
        <td>2010</td>
        <td>14.8</td>
      </tr>
      <tr>
        <td>2015</td>
        <td>15.1</td>
      </tr>
      <!-- Add more rows as needed -->
    </tbody>
  </table>

</body>
</html>
